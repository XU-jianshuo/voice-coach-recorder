services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-sqlite:////app/data/voice_coach.db}
      STORAGE_DIR: ${STORAGE_DIR:-/app/data/storage}
      ASR_PROVIDER: ${ASR_PROVIDER:-mock}
      USE_DEEPSEEK: ${USE_DEEPSEEK:-false}
      RAW_AUDIO_RETENTION_DAYS: ${RAW_AUDIO_RETENTION_DAYS:-30}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
      REQUIRE_HTTPS: ${REQUIRE_HTTPS:-true}
    expose:
      - "8000"
    volumes:
      - backend_data:/app/data
      - ./models:/app/models:ro
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/voice-coach.conf:/etc/nginx/conf.d/default.conf:ro
      - ./deploy/certs:/etc/nginx/certs:ro
      - nginx_logs:/var/log/nginx

volumes:
  backend_data:
  nginx_logs:
